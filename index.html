<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Oy Sistemi - CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 800px;">
    <h2 class="text-center mb-4">🗳️ AJAX (Fetch API) Tabanlı Oy Sistemi</h2>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Yeni Seçenek / Aday Ekle</h5>
            <div class="input-group mb-2">
                <input type="text" id="adayInput" class="form-control" placeholder="Aday veya Seçenek Adı Yazın" required>
                <button class="btn btn-success" type="button" onclick="adayEkle()">Ekle</button>
            </div>
            <div id="bildirimAlani" class="mt-2"></div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Güncel Sonuçlar</h5>
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Aday / Seçenek</th>
                        <th>Oy Sayısı</th>
                        <th class="text-center">İşlemler</th>
                    </tr>
                </thead>
                <tbody id="adayTablosu">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Sayfa ilk açıldığında listeyi yükle
document.addEventListener("DOMContentLoaded", listeyiYenile);

// READ: Verileri API'den Fetch ile çekip listeleme
function listeyiYenile() {
    fetch('api.php?action=listele')
    .then(res => res.json())
    .then(data => {
        let html = '';
        data.forEach(aday => {
            html += `
                <tr>
                    <td>${aday.id}</td>
                    <td><strong>${aday.aday_adi}</strong></td>
                    <td><span class="badge bg-primary fs-6">${aday.oy_sayisi} Oy</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-warning me-1" onclick="oyVer(${aday.id})">👍 Oy Ver</button>
                        <button class="btn btn-sm btn-danger" onclick="adaySil(${aday.id})">🗑️ Sil</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById('adayTablosu').innerHTML = html;
    })
    .catch(err => console.error("Hata oluştu:", err));
}

// CREATE: Yeni veri ekleme
function adayEkle() {
    const input = document.getElementById('adayInput');
    if (!input.value.trim()) {
        mesajVer("Lütfen bir isim yazın!", "danger");
        return;
    }

    fetch('api.php?action=ekle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ aday_adi: input.value })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            mesajVer(data.message, "success");
            input.value = '';
            listeyiYenile(); // Sayfa yenilenmeden listeyi günceller
        } else {
            mesajVer(data.message, "danger");
        }
    });
}

// UPDATE: Oy arttırma işlemi
function oyVer(id) {
    fetch('api.php?action=oyver', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            listeyiYenile(); // Sayfa yenilenmeden oyu günceller
        }
    });
}

// DELETE: Veri silme işlemi
function adaySil(id) {
    if (confirm("Bu adayı silmek istediğinize emin misiniz?")) {
        fetch('api.php?action=sil', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                mesajVer(data.message, "info");
                listeyiYenile(); // Sayfa yenilenmeden adayı siler
            }
        });
    }
}

// Bilgilendirme mesajı gösterme fonksiyonu
function mesajVer(mesaj, tip) {
    const alan = document.getElementById('bildirimAlani');
    alan.innerHTML = `<div class="alert alert-${tip} p-2 small">${mesaj}</div>`;
    setTimeout(() => { alan.innerHTML = ''; }, 2500);
}
</script>
</body>
</html>
